name: Release

# Publishes @clarvis/agent-tools to npm with provenance, gated on a version tag.
# Trigger by pushing a tag like `v0.1.0`, or run manually (workflow_dispatch).
# Auth is via npm trusted publishing (OIDC) — no token. Configure the trusted publisher
# on the package's npm settings (org getclarvis, repo agent-tools, workflow release.yml,
# environment npm-publish).
# Requires: the `npm-publish` environment (required reviewers = manual approval gate).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write # create the GitHub Release
      id-token: write # npm provenance (OIDC)
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing (OIDC) requires npm >= 11.5.1; the version bundled with Node may be older.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # ripgrep must be present so the grep ripgrep/in-process parity suite runs
      # under prepublishOnly's `npm test` (tests/integration/grep-parity.test.ts guards on this in CI).
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Verify version is releasable
        run: |
          set -euo pipefail
          LOCAL="$(node -p "require('./package.json').version")"
          echo "package.json version: $LOCAL"

          # When triggered by a tag, the tag (minus the leading v) must match package.json.
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME#v}"
            echo "git tag version: $TAG"
            if [ "$TAG" != "$LOCAL" ]; then
              echo "::error::Tag ($TAG) does not match package.json version ($LOCAL)."
              exit 1
            fi
          fi

          # Refuse to move the npm `latest` dist-tag backward (or republish the same version).
          PUBLISHED="$(npm view @clarvis/agent-tools@latest version 2>/dev/null || echo 0.0.0)"
          echo "npm latest: $PUBLISHED"
          HIGHEST="$(printf '%s\n%s\n' "$PUBLISHED" "$LOCAL" | sort -V | tail -1)"
          if [ "$PUBLISHED" = "$LOCAL" ] || [ "$HIGHEST" != "$LOCAL" ]; then
            echo "::error::package.json version ($LOCAL) must be greater than the published npm latest ($PUBLISHED)."
            exit 1
          fi

      # prepublishOnly (asserts README/SPEC exist, then build + test) runs automatically on publish.
      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "See CHANGELOG.md for details."
