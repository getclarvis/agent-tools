name: Docs

# Builds the VitePress site in docs/ and deploys it to GitHub Pages.
# Enable once in repo Settings → Pages → Source: "GitHub Actions".
# Production branch is `main`; change the branch below if you publish from `develop`.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so VitePress "Last updated" timestamps are accurate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        # --ignore-scripts blocks dependency install/postinstall hooks (supply-chain dropper vector);
        # VitePress builds fine without them.
        run: npm ci --ignore-scripts

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true # auto-enable Pages (source: GitHub Actions) on first run

      - name: Build docs
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
