name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 20.x is the supported floor (engines: node >= 20); lts/* and current exercise newer lines.
        node-version: [20.x, lts/*, current]
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        # --ignore-scripts blocks dependency install/postinstall hooks, the vector npm
        # supply-chain droppers run (e.g. the axios / plain-crypto-js compromise). The lockfile
        # is authoritative; no first-party dependency here needs an install script to build or test.
        run: npm ci --ignore-scripts

      # ripgrep must be present so the grep ripgrep/in-process parity suite runs
      # (tests/integration/grep-parity.test.ts guards on this in CI).
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test (with coverage gate)
        run: npm run test:coverage

      - name: Build
        run: npm run build
